# .github/workflows/preaudit-transcription.yml
name: preaudit-transcription

on:
  workflow_dispatch:
#  schedule:
#    - cron: "*/15 * * * *"

concurrency:
  group: voicecaster-preaudit-transcription
  cancel-in-progress: false

jobs:
  preaudit-transcription:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git-lfs

      - name: Free disk space before run
        run: |
          echo "Disk before cleanup:"
          df -h

          rm -rf ~/.cache/pip || true
          rm -rf ~/.cache/huggingface || true
          rm -rf ~/.cache/torch || true
          rm -rf ~/.cache/whisper || true
          rm -rf /usr/share/dotnet || true
          rm -rf /opt/ghc || true
          rm -rf /usr/local/lib/android || true

          echo "Disk after cleanup:"
          df -h

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PREAUDITORÍA transcription
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          PREAUDIT_ARCHIVE_RETENTION_DAYS: "5"
          HTTP_CONNECT_TIMEOUT_SECONDS: "15"
          HTTP_READ_TIMEOUT_SECONDS: "120"
        run: |
          PYTHONPATH=src python -m voicecaster.cli preaudit-transcription

      - name: Upload work artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preaudit-transcription-work
          path: |
            work/**
            reviews/**
            data/runtime_control.json
          retention-days: 2

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "chore: preaudit transcription outputs"
            git push
          else
            echo "No hay cambios para commit."
          fi
