name: preaudit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

concurrency:
  group: voicecaster-preaudit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preaudit:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PREAUDITORÍA
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          PREAUDIT_ARCHIVE_RETENTION_DAYS: "5"
          HTTP_CONNECT_TIMEOUT_SECONDS: "15"
          HTTP_READ_TIMEOUT_SECONDS: "120"
        run: |
          PYTHONPATH=src python -m voicecaster.cli preaudit

      - name: Upload work artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preaudit-work
          path: |
            work/**
            reviews/**
          retention-days: 5

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inputs/ reviews/ work/ data/
          git diff --cached --quiet || git commit -m "chore: preaudit outputs"
          git push
